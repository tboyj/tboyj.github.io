<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="../components/navbar.js"></script>
  <script src="../components/footer.js"></script>
  <link rel="stylesheet" href="../global.css"/>
  <link rel="icon" href="../favicon.ico" type="image/x-icon">
  <title>blog | tboyj</title>
  <style>

    #post-content {
      max-width: 680px;
      margin: 0 auto;
      padding: 48px 24px 48px;
    }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 48px;
      font-family: var(--font-datatype, sans-serif);
      font-size: 0.85rem;
      color: rgba(255,255,255,0.35);
      text-transform: lowercase;
      justify-content: space-between;
      
    }

    .post-meta .dot {
      opacity: 0;
    }

    .post-title {
      font-family: var(--font-bricolage, sans-serif);
      font-size: clamp(2.5rem, 7vw, 3.5rem);
      font-weight: 700;
      line-height: 1.1;
      margin: 0 0 12px;
      color: var(--base-white, white);
      flex-wrap: wrap;
    }

    .post-description {
      font-family: var(--font-dm, sans-serif);
      font-size: 1rem;
      color: rgba(255,255,255,0.45);
      margin: 0 0 12px;
      line-height: 1.6;
    }

    .post-divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.08);
      margin: 0 0 12px;
    }

    /* Markdown body styles */
    .md-body {
      font-family: var(--font-dm, sans-serif);
      font-size: 1rem;
      line-height: 1.8;
      color: rgba(255,255,255,0.75);
    }

    @media screen and (max-width: 480px) {
      .md-body, .post-title, .post-description, .post-meta, .post-meta span, .post-divider, .post-card-tags {
        justify-content: center;
      }
      .post-meta, .post-title {
        text-align: center;
        
      }
      .post-card-tags {
        width:100%;
        display: block;
      }
      .panel {
        margin:1em;
      }
    }

  .post-card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
  }

    .md-body h1, .md-body h2, .md-body h3,
    .md-body h4, .md-body h5, .md-body h6 {
      font-family: var(--font-bricolage, sans-serif);
      color: var(--base-white, white);
      margin: 1em 0 0.5em;
      line-height: 1.2;
    }

    .md-body h1 { font-size: 2rem; }
    .md-body h2 { font-size: 1.5rem; }
    .md-body h3 { font-size: 1.2rem; }

    .md-body p { margin: 0 0 1.4em; }

    .md-body a {
      color: var(--accent-1, white);
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: opacity 0.2s;
    }

    .md-body a:hover { opacity: 0.7; }

    .md-body code {
      font-family: var(--font-datatype), monospace;
      font-size: 0.85em;
      background: rgba(255,255,255,0.07);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--accent-1, #ccc);
    }

    .md-body pre {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius:0px;
      padding: 20px 24px;
      overflow-x: auto;
      margin: 0 0 1.6em;
    }

    .md-body pre code {
      background: none;
      padding: 0;
      font-size: 0.875rem;
      color: rgba(255,255,255,0.8);
    }

    .md-body blockquote {
      border-left: 3px solid var(--accent-1, white);
      margin: 0 0 1.6em;
      padding: 4px 0 4px 20px;
      color: rgba(255,255,255,0.45);
      font-style: italic;
    }

    .md-body ul, .md-body ol {
      padding-left: 1.5em;
      margin: 0 0 1.4em;
    }

    .md-body li { margin-bottom: 0.4em; }

    .md-body hr {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.08);
      margin: 2.5em 0;
    }

    .md-body img {
      max-width: 100%;
      border-radius:0px;
      margin: 1em 0;
    }

    .md-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 0 0 1.6em;
      font-size: 0.9rem;
    }

    .md-body th {
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      color: var(--base-white, white);
      font-family: var(--font-bricolage, sans-serif);
    }

    .md-body td {
      padding: 8px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .error-msg {
      font-family: var(--font-dm, sans-serif);
      color: rgba(255,255,255,0.4);
      text-align: center;
      padding: 80px 0;
    }

  </style>
</head>
<body>
  <site-navbar id="navbar"></site-navbar>

  <main>
    <div class="panel">
    <div id="post-content">
      <p class="error-msg">Loading...</p>
    </div>
    </div>
  </main>

  <footer>
    <site-footer></site-footer>
  </footer>

  <script>
    lucide.createIcons();

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    async function loadPost(id) {
      const container = document.getElementById("post-content");

      if (!id) {
        container.innerHTML = `<p class="error-msg">No post specified.</p>`;
        return;
      }

      try {
        const [mdRes, metaRes] = await Promise.all([
          fetch(`posts/${id}/markdown.md`),
          fetch(`posts/${id}/metadata.json`)
        ]);

        if (!mdRes.ok || !metaRes.ok) throw new Error("Not found");

        const [md, meta] = await Promise.all([mdRes.text(), metaRes.json()]);

        // Update page title
        document.title = `${meta.title} | tboyj`;

        // Update navbar breadcrumb
        const date = new Date(meta.date).toLocaleDateString("en-US", {
          year: "numeric", month: "long", day: "numeric"
        });
        const tagsHtml = (meta.tags || []).length
          ? `<div class="post-card-tags" style="margin: 0 0 2em; display: flex; gap: 6px;">
              ${meta.tags.map(t => `<span class="post-tag-btn">${t}</span>`).join("")}
            </div>`
          : "";

        container.innerHTML = `
          <h1 class="post-title">${meta.title}</h1>
          <p class="post-description">${meta.description}</p>
          ${tagsHtml}
          <div class="post-meta">
            <span>${date}</span>
            <span class="dot">·</span>
            <span>${meta.author}</span>
          </div>
          <hr class="post-divider">
          <div class="md-body">${marked.parse(md)}</div>
        `;
      } catch (e) {
        container.innerHTML = `<p class="error-msg">Post not found.</p>`;
      }
    }

    loadPost(id);
  </script>
</body>
</html>
