<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="../components/navbar.js"></script>
  <link rel="stylesheet" href="../global.css"/>
  <link rel="icon" href="../favicon.ico" type="image/x-icon">
  <script src="indexloader.js" defer></script>
  <title>blog | tboyj</title>
  <style>
  main {
        padding: 3em 1.5em 3em 1.5em;
  }

  .blog-header {
    margin-bottom: 48px;
  }

  .blog-header h1 {
    font-family: var(--font-bricolage, sans-serif);
    font-size: clamp(2.5rem, 7vw, 3.5rem);
    font-weight: 700;
    margin: 0 0 12px;
    color: var(--base-white, white);
  }

  .blog-header p {
    font-family: var(--font-dm, sans-serif);
    font-size: 1rem;
    color: rgba(255,255,255,0.4);
    margin: 0;
  }

  /* Search + tag filter row */
  .filter-row {
    display: flex;
    margin-bottom: 32px;
    align-items: stretch;
    height: 48px;
  }

  .search-input {
    flex: 1;
    font-family: var(--font-datatype, sans-serif);
    font-size: 1rem;
    padding: 4px 8px;
    border: 1px solid rgba(255,255,255,0.1);
    background: var(--base-bl-compl-2);
    color: var(--base-white);
    outline: none;
    transition: border-color 0.15s;
    min-width: 120px;
  }

    /* Tag dropdown */
  .tag-dropdown-wrap {
    position: relative;
  }

  .tag-dropdown-btn {
    font-family: var(--font-dm, sans-serif);
    font-size: 1rem;
    padding: 14px 14px;
    border: none;
    background: var(--accent-1);
    color: var(--base-white);
    cursor: pointer;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background-color 0.15s, color 0.15s;
    height: 100%;
  }

  .tag-dropdown-btn:hover,
  .tag-dropdown-btn.open {
    color: var(--base-wh-compl);
    background-color: var(--accent-3);
  }

  .tag-dropdown-btn.has-selection {
    /* nothing */
  }

  .tag-dropdown-btn .chevron {
    font-size: 0.6rem;
    opacity: 1;
    transition: transform 0.15s;
  }

  .tag-dropdown-btn.open .chevron {
    transform: rotate(180deg);
  }

  .tag-dropdown-menu {
    display: none;
    position: absolute;
    right: 0;
    top: calc(100% + 0px);
    min-width: 160px;
    background: var(--base-bl-compl-2, #1D1D20);
    border: 1px solid rgba(255,255,255,0.1);
    border-top: none;
    padding: 6px;
    z-index: 50;
    flex-direction: column;
    gap: 2px;
  }

  .tag-dropdown-menu.open {
    display: flex;
  }


  @media screen and (max-width: 330px) {
    #tag-dropdown-btn, .tag-dropdown-btn {
      display: none;
    }
    
    
  }

  .search-input::placeholder {
    color: rgba(255,255,255,0.25);
  }

  .search-input:focus {
    border-color: var(--accent-1);
  }


  .tag-option {
    font-family: var(--font-datatype, sans-serif);
    font-size: .9rem;
    padding: 10px 10px;
    border-radius: 4px;
    cursor: pointer;
    color: rgba(255,255,255,0.5);
    display: flex;
    align-items: center;
    transition: background 0.1s, color 0.1s;
    user-select: none;
  }

  .tag-option:hover {
    background: rgba(255,255,255,0.05);
    color: var(--base-white);
  }

  .tag-option.selected {
    background-color: var(--accent-5);
    color: var(--base-wh-compl);
  }

  .tag-option .check {
    opacity: 0;
  }

  .tag-option.selected .check {
    opacity: 1;
  }

  .tag-dropdown-clear {
    font-family: var(--font-dm, sans-serif);
    font-size: .90rem;
    color: rgba(255,255,255,0.2);
    padding: 10px 10px;
    cursor: pointer;
    border-top: 1px solid rgba(255,255,255,0.06);
    margin-top: 4px;
    padding-top: 8px;
    transition: color 0.1s;
  }

  .tag-dropdown-clear:hover {
    color: rgba(255,255,255,0.5);
  }

  /* Post list */
  .post-list {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .post-card {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 24px;
    padding: 20px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    text-decoration: none;
    padding: 2em;
    border-radius:0px;
  }

  .post-card:first-child {
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .post-card:hover {
    background: linear-gradient(
    to left,
    var(--accent-5) 0%,
    var(--base-bl-compl) 100%
    );
    
  }

  .post-card-title {
    font-family: var(--font-bricolage, sans-serif);
    color: var(--base-white);
  }

  .post-card:hover .post-card-title {
    color: var(--accent-1);
  }

  .post-card-left {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }

  .post-card-desc {
    font-family: var(--font-dm, sans-serif);
    font-size: 0.75rem;
    color: rgba(255,255,255,0.35);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .post-card-date {
    font-family: var(--font-datatype, sans-serif);
    font-size: 0.75rem;
    color: rgba(255,255,255,0.25);
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* Inline tag chips on card */
  .post-card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
  }



  .empty-msg {
    font-family: var(--font-dm, sans-serif);
    color: rgba(255,255,255,0.3);
    text-align: center;
    padding: 80px 0;
  }

  @media screen and (max-width: 830px) {
    .blog-header {
      text-align: center;
    }
    .post-card {
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 8px;
    }
    .post-card-date {
      align-self: center;
    }
    .post-card-tags {
      justify-content: center;
    }
    .tag-filter {
      justify-content: center;
    }
  }
  </style>
</head>
<body>
  <site-navbar path="/blog"></site-navbar>

  <main>
    <div class="panel">
      <div class="blog-header">
        <h1>blog</h1>
        <p>ramblings and writings normally go here</p>
      </div>

      <div class="filter-row">
        <input class="search-input" id="search-input" type="text" placeholder="search by title" autocomplete="off" />
        <div class="tag-dropdown-wrap" id="tag-dropdown-wrap">
          <button class="tag-dropdown-btn" id="tag-dropdown-btn">
            tags <span class="chevron">▼</span>
          </button>
          <div class="tag-dropdown-menu" id="tag-dropdown-menu"></div>
        </div>
      </div>

      <div class="post-list" id="post-list">
        <p class="empty-msg">Loading...</p>
      </div>
    </div>
  </main>

  <footer>
    <site-footer></site-footer>
  </footer>
</body>
</html>
