            .tile {
                width: 50px;
                height: 50px;
                background: var(--accent-1);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 2em;
                font-weight: 900;
                font-family: var(--font-bricolage);
                color: var(--base-white);
                position: relative;
                overflow: hidden;
                user-select: none;
            }
            
            .tile::after {
                content: '';
                position: absolute;
                left: 0; right: 0;
                top: 50%;
                height: 1px;
                pointer-events: none;
            }
            
            .tile.flip {
                animation: tileFlip .5s ease-out forwards;
            }
            
            @keyframes tileFlip {
                0%  { transform: rotateX(0) scaleY(1); opacity: 1; }
                100% { transform: rotateX(0deg) scaleY(1); opacity: 1; }
            }

            .real-img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                position: absolute;
                top: 0;
                left: 0;
                z-index: 1;
                user-select: none;
                filter: grayscale(100%) hue-rotate(0deg) saturate(100%) blur(0.05em);
            }
            .real-img img {
                image-rendering: pixelated;
                transform: scale(1.05);
            }
            .bg-img::after {
                content: '';
                position: absolute;
                top: 0; left: 0; width: 100%; height: 100%;
                background-color: var(--accent-1); /* Red with 50% opacity */
                mix-blend-mode: multiply; /* Blends red with image */

            .carousel

            .hero-right img {

                display: block;
                width: 8vw; 
                rotate: -4deg;
                user-select: none;
                z-index: 4;
            }

    <script>
    const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const WORD1 = 'JACKSON';
    const WORD2 = 'PHILIPS';
    
    function rand(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }
    
    function animateTile(tile, finalChar, startDelay) {
        const shuffleCount = 7;
        const shuffleInterval = 55;
    
        setTimeout(() => {
        let count = 0;
        const iv = setInterval(() => {
            tile.textContent = rand(CHARS);
            tile.classList.remove('flip');
            void tile.offsetWidth;
            tile.classList.add('flip');
            count++;
            if (count >= shuffleCount) {
            clearInterval(iv);
            setTimeout(() => {
                tile.textContent = finalChar;
                tile.classList.remove('flip');
                void tile.offsetWidth;
                tile.classList.add('flip');
            }, shuffleInterval);
            }
        }, shuffleInterval);
        }, startDelay);
    }
    
    function buildRow(id, word, globalDelay) {
        const row = document.getElementById(id);
        row.innerHTML = '';
        word.split('').forEach((letter, i) => {
        const tile = document.createElement('div');
        tile.className = 'tile';
        tile.textContent = rand(CHARS);
        row.appendChild(tile);
        animateTile(tile, letter, globalDelay + i * 90);
        });
    }
    
    function run() {
        buildRow('row1', WORD1, 0);
        buildRow('row2', WORD2, WORD1.length * 90 * 0.6);
    }
    
    run();
    </script>
